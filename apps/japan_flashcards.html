<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Flashcards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1rem; color: #1a1a1a; }
  #app { max-width: 600px; margin: 0 auto; padding-top: 1rem; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a1a; }
  .tab-bar { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: #555; transition: all 0.15s; }
  .tab.active { background: #1a56db; color: #fff; border-color: transparent; font-weight: 500; }
  .tab:hover:not(.active) { background: #eee; }
  .stats-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .stat-pill { background: #e8e8e4; border-radius: 8px; padding: 4px 12px; font-size: 12px; color: #555; }
  .stat-pill span { font-weight: 600; color: #1a1a1a; }
  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; }
  .progress-label { font-size: 13px; color: #666; white-space: nowrap; }
  .progress-bar-wrap { flex: 1; height: 4px; background: #ddd; border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #1a56db; border-radius: 2px; transition: width 0.3s; }
  .scene { perspective: 1200px; width: 100%; height: 290px; cursor: pointer; margin-bottom: 1rem; }
  .flipper { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4,0,0.2,1); }
  .flipper.flipped { transform: rotateY(180deg); }
  .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border: 1px solid #ddd; border-radius: 16px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; overflow: hidden; }
  .face.back { transform: rotateY(180deg); }
  .card-category { font-size: 11px; letter-spacing: 0.08em; color: #999; text-transform: uppercase; margin-bottom: 0.75rem; }
  .card-front-main { font-size: 48px; line-height: 1.2; color: #1a1a1a; text-align: center; }
  .card-front-hint { font-size: 13px; color: #aaa; margin-top: 0.5rem; text-align: center; }
  .card-back-kana { font-size: 28px; color: #1a1a1a; text-align: center; margin-bottom: 0.5rem; }
  .card-back-english { font-size: 16px; color: #1a1a1a; font-weight: 500; text-align: center; }
  .card-back-note { font-size: 12px; color: #aaa; margin-top: 0.6rem; text-align: center; font-style: italic; max-width: 300px; line-height: 1.5; }
  .flip-hint { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 1rem; }
  .srs-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; justify-content: center; }
  .srs-btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; cursor: pointer; background: #fff; color: #1a1a1a; font-family: inherit; transition: all 0.15s; display: none; }
  .srs-btn.visible { display: inline-block; }
  .srs-btn:active { transform: scale(0.97); }
  .srs-btn.again { color: #c0392b; border-color: #e8a09a; }
  .srs-btn.again:hover { background: #fdf0ef; }
  .srs-btn.hard { color: #b7760d; border-color: #f0c97a; }
  .srs-btn.hard:hover { background: #fef8ec; }
  .srs-btn.good { color: #1a7a4a; border-color: #7ed4a6; }
  .srs-btn.good:hover { background: #edfaf3; }
  .srs-btn.easy { color: #1a56db; border-color: #92b4f4; }
  .srs-btn.easy:hover { background: #eef2fd; }
  .actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .action-btn { padding: 6px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; cursor: pointer; background: #fff; color: #555; font-family: inherit; transition: all 0.15s; }
  .action-btn:hover { background: #eee; }
  .action-btn.danger { color: #c0392b; border-color: #e8a09a; }
  .action-btn.danger:hover { background: #fdf0ef; }
  .done-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 290px; text-align: center; gap: 0.75rem; }
  .done-screen.visible { display: flex; }
  .done-label { font-size: 18px; font-weight: 600; }
  .done-sub { font-size: 14px; color: #666; }
  @media (prefers-color-scheme: dark) {
    body { background: #1c1c1e; color: #f0f0f0; }
    .tab { background: #2c2c2e; border-color: #444; color: #aaa; }
    .tab.active { background: #1a56db; color: #fff; border-color: transparent; }
    .tab:hover:not(.active) { background: #3a3a3c; }
    .stat-pill { background: #2c2c2e; color: #aaa; }
    .stat-pill span { color: #f0f0f0; }
    .progress-bar-wrap { background: #3a3a3c; }
    .face { background: #2c2c2e; border-color: #444; }
    .card-front-main, .card-back-kana, .card-back-english, h1 { color: #f0f0f0; }
    .srs-btn, .action-btn { background: #2c2c2e; border-color: #444; color: #f0f0f0; }
    .done-label { color: #f0f0f0; }
  }
</style>
</head>
<body>
<div id="app">
  <h1>🇯🇵 Japan Flashcards</h1>
  <div class="tab-bar" id="tabs"></div>
  <div class="stats-row" id="stats-row"></div>
  <div class="progress-row">
    <span class="progress-label" id="prog-label">0 / 0</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="scene" id="scene" onclick="handleFlip()">
    <div class="flipper" id="flipper">
      <div class="face front">
        <span class="card-category" id="front-cat"></span>
        <div class="card-front-main" id="front-main"></div>
        <div class="card-front-hint" id="front-hint"></div>
      </div>
      <div class="face back">
        <span class="card-category" id="back-cat"></span>
        <div class="card-back-kana" id="back-kana"></div>
        <div class="card-back-english" id="back-english"></div>
        <div class="card-back-note" id="back-note"></div>
      </div>
    </div>
  </div>
  <div class="done-screen" id="done-screen">
    <div class="done-label">Session complete!</div>
    <div class="done-sub" id="done-sub"></div>
    <button class="action-btn" onclick="resetDeck()" style="margin-top:0.5rem">Study again</button>
  </div>
  <p class="flip-hint" id="flip-hint">Tap card to reveal</p>
  <div class="srs-bar" id="srs-bar">
    <button class="srs-btn again" onclick="rate(1)">Again</button>
    <button class="srs-btn hard" onclick="rate(2)">Hard</button>
    <button class="srs-btn good" onclick="rate(3)">Good</button>
    <button class="srs-btn easy" onclick="rate(4)">Easy</button>
  </div>
  <div class="actions">
    <button class="action-btn" onclick="skipCard()">Skip</button>
    <button class="action-btn danger" onclick="deleteCard()">Remove card</button>
    <button class="action-btn" onclick="resetDeck()">Restart session</button>
  </div>
</div>

const CATS = [
  {key:"all",label:"All"},
  {key:"menu",label:"Menus"},
  {key:"hear",label:"You'll hear"},
  {key:"say",label:"You'll say"},
  {key:"polite",label:"Polite language"},
  {key:"signs",label:"Signs"},
];

const STORE_KEY = 'jf3_deck';
const DEL_KEY = 'jf3_deleted';

let saved = null;
try { saved = JSON.parse(localStorage.getItem(STORE_KEY)); } catch(e){}
let deletedIds = [];
try { deletedIds = JSON.parse(localStorage.getItem(DEL_KEY)) || []; } catch(e){}

let deck = ALL_CARDS.map(c => {
  const s = saved ? saved.find(x => x.id === c.id) : null;
  return s ? {...c, interval:s.interval||1, easeFactor:s.easeFactor||2.5, due:s.due||0, reps:s.reps||0, deleted:deletedIds.includes(c.id)}
           : {...c, interval:1, easeFactor:2.5, due:0, reps:0, deleted:deletedIds.includes(c.id)};
});

let activeTab = 'all', queue = [], queueIdx = 0, isFlipped = false, pendingNext = false;
let sessionStats = {again:0,hard:0,good:0,easy:0};

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}
function save() {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(deck.map(c=>({id:c.id,interval:c.interval,easeFactor:c.easeFactor,due:c.due,reps:c.reps}))));
    localStorage.setItem(DEL_KEY, JSON.stringify(deletedIds));
  } catch(e){}
}
function buildQueue() {
  const now = Date.now();
  const pool = deck.filter(c=>!c.deleted&&(activeTab==='all'||c.cat===activeTab));
  const due = shuffle(pool.filter(c=>c.due<=now));
  const notDue = shuffle(pool.filter(c=>c.due>now));
  queue = [...due, ...notDue.slice(0,Math.max(0,30-due.length))];
  if(!queue.length) queue = shuffle(pool.slice());
  queueIdx = 0;
  sessionStats = {again:0,hard:0,good:0,easy:0};
}
function currentCard(){return queue[queueIdx];}
function renderTabs() {
  document.getElementById('tabs').innerHTML = CATS.map(t=>{
    const count = t.key==='all'?deck.filter(c=>!c.deleted).length:deck.filter(c=>!c.deleted&&c.cat===t.key).length;
    return `<button class="tab${activeTab===t.key?' active':''}" onclick="switchTab('${t.key}')">${t.label} <small style="opacity:.65">${count}</small></button>`;
  }).join('');
}
function renderStats() {
  document.getElementById('stats-row').innerHTML=`<div class="stat-pill">Again <span>${sessionStats.again}</span></div><div class="stat-pill">Hard <span>${sessionStats.hard}</span></div><div class="stat-pill">Good <span>${sessionStats.good}</span></div><div class="stat-pill">Easy <span>${sessionStats.easy}</span></div>`;
}
function renderProgress() {
  const done=Math.min(queueIdx,queue.length),total=queue.length;
  document.getElementById('prog-label').textContent=done+' / '+total;
  document.getElementById('prog-fill').style.width=(total?Math.round(done/total*100):0)+'%';
}
function populateCard(card) {
  if(!card) return;
  const isSay=card.cat==='say', isPolite=card.cat==='polite';
  if(isSay) {
    document.getElementById('front-cat').textContent='You want to say';
    const fm=document.getElementById('front-main');
    fm.textContent=card.front;
    fm.style.fontSize=card.front.length>35?'15px':card.front.length>20?'18px':'22px';
    document.getElementById('front-hint').textContent='';
    document.getElementById('back-cat').textContent='In Japanese';
    document.getElementById('back-kana').textContent=card.kana;
    document.getElementById('back-english').textContent=card.english;
    document.getElementById('back-note').textContent=card.note||'';
  } else if(isPolite) {
    document.getElementById('front-cat').textContent='Polite language';
    const fm=document.getElementById('front-main');
    fm.textContent=card.front;
    fm.style.fontSize=card.front.length>10?'22px':'36px';
    document.getElementById('front-hint').textContent='';
    document.getElementById('back-cat').textContent='Reading & meaning';
    document.getElementById('back-kana').textContent=card.kana;
    document.getElementById('back-english').textContent=card.english;
    document.getElementById('back-note').textContent=card.note||'';
  } else {
    const catLabel=card.cat==='menu'?'Menu reading':card.cat==='signs'?'Sign':"You'll hear";
    document.getElementById('front-cat').textContent=catLabel;
    const fm=document.getElementById('front-main');
    fm.textContent=card.front;
    fm.style.fontSize=card.front.length>10?'22px':card.front.length>5?'36px':'48px';
    document.getElementById('front-hint').textContent=card.frontHint?'('+card.frontHint+')':'';
    document.getElementById('back-cat').textContent='Reading & meaning';
    document.getElementById('back-kana').textContent=card.kana;
    document.getElementById('back-english').textContent=card.english;
    document.getElementById('back-note').textContent=card.note||'';
  }
}
function renderCard() {
  const card=currentCard();
  if(!card){showDone();return;}
  document.getElementById('done-screen').classList.remove('visible');
  document.getElementById('scene').style.display='';
  document.getElementById('flip-hint').style.display='';
  document.getElementById('srs-bar').style.display='';
  const flipper=document.getElementById('flipper');
  flipper.style.transition='none';
  flipper.classList.remove('flipped');
  flipper.offsetHeight;
  flipper.style.transition='';
  isFlipped=false; pendingNext=false;
  populateCard(card);
  document.querySelectorAll('.srs-btn').forEach(b=>b.classList.remove('visible'));
  document.getElementById('flip-hint').textContent='Tap card to reveal';
  renderProgress(); renderStats();
}
function handleFlip() {
  if(!currentCard()||pendingNext) return;
  isFlipped=!isFlipped;
  document.getElementById('flipper').classList.toggle('flipped',isFlipped);
  if(isFlipped){
    document.getElementById('flip-hint').textContent='How well did you know it?';
    document.querySelectorAll('.srs-btn').forEach(b=>b.classList.add('visible'));
  } else {
    document.getElementById('flip-hint').textContent='Tap card to reveal';
    document.querySelectorAll('.srs-btn').forEach(b=>b.classList.remove('visible'));
  }
}
function advanceToNext(){if(queueIdx>=queue.length)showDone();else renderCard();}
function rate(quality) {
  const card=currentCard();
  if(!card||pendingNext) return;
  pendingNext=true;
  const ef=Math.max(1.3,card.easeFactor+(0.1-(5-quality)*(0.08+(5-quality)*0.02)));
  let interval;
  if(quality===1){interval=1;card.reps=0;}
  else if(card.reps===0){interval=1;card.reps=1;}
  else if(card.reps===1){interval=6;card.reps=2;}
  else{interval=Math.round(card.interval*ef);card.reps++;}
  card.interval=interval; card.easeFactor=ef;
  card.due=Date.now()+interval*24*60*60*1000;
  const labels={1:'again',2:'hard',3:'good',4:'easy'};
  sessionStats[labels[quality]]++;
  save(); queueIdx++;
  const flipper=document.getElementById('flipper');
  flipper.classList.remove('flipped');
  flipper.addEventListener('transitionend',advanceToNext,{once:true});
}
function skipCard(){if(pendingNext)return;queueIdx++;if(queueIdx>=queue.length)showDone();else renderCard();}
function deleteCard(){
  if(pendingNext)return;
  const card=currentCard();if(!card)return;
  card.deleted=true;
  if(!deletedIds.includes(card.id))deletedIds.push(card.id);
  save(); queue.splice(queueIdx,1); renderTabs();
  if(queueIdx>=queue.length)showDone();else renderCard();
}
function resetDeck(){buildQueue();renderCard();renderTabs();}
function showDone(){
  document.getElementById('scene').style.display='none';
  document.getElementById('flip-hint').style.display='none';
  document.getElementById('srs-bar').style.display='none';
  document.getElementById('done-screen').classList.add('visible');
  document.getElementById('done-sub').textContent='Session: '+(sessionStats.good+sessionStats.easy)+' good, '+sessionStats.hard+' hard, '+sessionStats.again+' again';
  renderProgress();renderStats();
}
function switchTab(key){activeTab=key;renderTabs();buildQueue();renderCard();}
renderTabs();buildQueue();renderCard();
</script>
</body>
